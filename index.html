<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRIS Competition Center</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    
    <style>
        /* ============ hai ============ */
        :root {
            --bg-dark: #020617;        /* Biru dongker sangat gelap sebagai dasar */
            --bg-card-glass: rgba(15, 23, 42, 0.6); /* Transparan gelap untuk kartu */
            --border-glass: rgba(148, 163, 184, 0.1); /* Border halus */
            --primary-glow: #0ea5e9;   /* Biru cyan terang untuk efek glow */
            --secondary-blue: #3b82f6; /* Biru standar untuk aksen */
            --text-light: #f1f5f9;     /* Putih terang */
            --text-muted: #94a3b8;     /* Abu-abu kebiruan */
            --accent-gradient: linear-gradient(135deg, #0ea5e9, #3b82f6); /* Gradasi untuk tombol */
        }

        * { box-sizing: border-box; }
        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: var(--bg-dark);
            color: var(--text-light); 
            margin: 0; 
            padding: 40px 20px; 
            line-height: 1.6;
            min-height: 100vh;
            /* Latar belakang kompleks meniru tema gambar */
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(14, 165, 233, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(59, 130, 246, 0.15) 0%, transparent 40%),
                linear-gradient(to bottom right, #020617, #0f172a);
            background-attachment: fixed;
            position: relative;
            overflow-x: hidden;
        }

        /* Lapisan tekstur noise halus di atas background */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: -1;
            opacity: 0.4;
        }

        .container { max-width: 1200px; margin: auto; position: relative; z-index: 1; }

        /* HEADER & LOGO */
        .header-section { text-align: center; margin-bottom: 60px; }
        .logo-container { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 15px; }
        /* Placeholder logo putih, ganti src nanti */
        .brand-logo { height: 50px; width: auto; object-fit: contain; filter: drop-shadow(0 0 10px rgba(14, 165, 233, 0.5)); } 
        
        h1 { 
            color: var(--text-light); font-weight: 800; font-size: 3.2rem; margin: 0; letter-spacing: -1px; text-transform: uppercase; 
            text-shadow: 0 0 20px rgba(14, 165, 233, 0.3); /* Efek glow pada teks */
        }
        h1 span { 
            background: var(--accent-gradient); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: none; filter: drop-shadow(0 0 15px rgba(14, 165, 233, 0.4));
        }
        .subtitle { color: var(--text-muted); margin-top: 10px; font-weight: 400; letter-spacing: 0.5px; font-size: 1.1rem; opacity: 0.8; }

        /* KONTROL PENCARIAN & FILTER (Glassmorphism Kuat) */
        .controls { display: flex; gap: 20px; max-width: 800px; margin: 40px auto; flex-wrap: wrap; }
        .search-wrapper { position: relative; flex: 2; min-width: 280px; }
        .search-box, .filter-box { 
            width: 100%; padding: 16px 25px 16px 55px; font-size: 1rem; 
            border: 1px solid var(--border-glass); border-radius: 16px; outline: none; 
            background: var(--bg-card-glass); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            color: var(--text-light); transition: all 0.3s ease; font-family: inherit; 
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
        }
        .filter-box { padding-left: 25px; cursor: pointer; }
        .search-box:focus, .filter-box:focus { 
            border-color: var(--primary-glow); 
            box-shadow: 0 0 25px rgba(14, 165, 233, 0.3), inset 0 0 0 1px rgba(255, 255, 255, 0.1);
            background: rgba(15, 23, 42, 0.8);
        }
        .search-box::placeholder { color: var(--text-muted); opacity: 0.7; }
        .search-icon { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: var(--primary-glow); opacity: 0.8; }
        .filter-box option { background: #0f172a; color: var(--text-light); }

        /* TABS */
        .tabs { display: flex; justify-content: center; gap: 25px; margin: 40px 0; }
        .tab-btn { 
            padding: 12px 24px; border: none; background: transparent; color: var(--text-muted); 
            font-size: 0.95rem; font-weight: 600; cursor: pointer; position: relative;
            transition: all 0.3s; display: flex; align-items: center; gap: 10px; 
            text-transform: uppercase; letter-spacing: 1px;
        }
        .tab-btn::after {
            content: ''; position: absolute; bottom: 0; left: 50%; width: 0; height: 2px; 
            background: var(--accent-gradient); transition: all 0.3s ease; transform: translateX(-50%);
            box-shadow: 0 0 10px var(--primary-glow);
        }
        .tab-btn:hover { color: var(--text-light); }
        .tab-btn.active { color: var(--text-light); }
        .tab-btn.active::after { width: 100%; }
        .tab-btn .material-symbols-outlined, .tab-btn .material-symbols-rounded {
            font-size: 20px; transition: all 0.3s; color: var(--text-muted);
        }
        .tab-btn.active .material-symbols-outlined, .tab-btn.active .material-symbols-rounded {
            color: var(--primary-glow); filter: drop-shadow(0 0 5px var(--primary-glow));
        }

        /* GRID & CARD */
        #lomba-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }
        .card { 
            background: var(--bg-card-glass); border-radius: 20px; overflow: hidden; cursor: pointer; 
            border: 1px solid var(--border-glass); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            position: relative; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.3);
        }
        .card:hover { 
            transform: translateY(-10px) scale(1.02); 
            border-color: var(--primary-glow); 
            box-shadow: 0 20px 50px -15px rgba(14, 165, 233, 0.3), inset 0 0 0 1px rgba(255, 255, 255, 0.1); 
        }

        .card-thumb-container { height: 220px; overflow: hidden; background: #020617; position: relative; }
        .card-thumb { 
            width: 100%; height: 100%; object-fit: cover; object-position: center top; 
            transition: transform 0.6s ease, filter 0.4s; 
            filter: brightness(0.95); /* Diterangkan kembali */
        }
        .card-thumb-container::after { 
            /* Gradasinya diturunkan ke bawah aja biar tulisan lomba tetep kebaca tapi gambar gak ketutup */
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent 60%, rgba(2, 6, 23, 0.9));
            pointer-events: none;
        }
        .card:hover .card-thumb { transform: scale(1.08); filter: brightness(1.1) saturate(1.1); }
        
        /* BADGE & BOOKMARK */
        .badge-status { 
            position: absolute; top: 15px; left: 15px; padding: 6px 14px; border-radius: 30px; 
            font-size: 0.7rem; font-weight: 700; color: white; z-index: 3; 
            border: 1px solid rgba(255,255,255,0.15); text-transform: uppercase; letter-spacing: 1px;
            backdrop-filter: blur(5px); box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .status-buka { background: rgba(16, 185, 129, 0.25); color: #6ee7b7; border-color: #34d399; }
        .status-segera { background: rgba(245, 158, 11, 0.25); color: #fcd34d; border-color: #fbbf24; }
        .status-tutup { background: rgba(100, 116, 139, 0.4); color: #cbd5e1; border-color: #94a3b8; }

        .bookmark-btn { 
            position: absolute; top: 12px; right: 12px; 
            background: rgba(15, 23, 42, 0.5); backdrop-filter: blur(5px); 
            border: 1px solid rgba(255,255,255,0.1); width: 40px; height: 40px; border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 3; 
            color: var(--text-muted); transition: all 0.3s; 
        }
        .bookmark-btn:hover { background: rgba(14, 165, 233, 0.2); color: var(--text-light); border-color: var(--primary-glow); box-shadow: 0 0 15px rgba(14, 165, 233, 0.3); }
        .bookmark-btn.saved { color: #fbbf24; border-color: rgba(251, 191, 36, 0.5); background: rgba(245, 158, 11, 0.15); filter: drop-shadow(0 0 5px rgba(251, 191, 36, 0.5)); }

        .card-content { padding: 25px; position: relative; }
        .card h3 { margin: 0 0 15px 0; color: var(--text-light); font-size: 1.3rem; line-height: 1.3; font-weight: 700; }
        .card-meta { display: flex; align-items: center; gap: 10px; color: var(--text-muted); font-size: 0.9rem; margin-bottom: 10px; font-weight: 500; }
        .card-meta .material-symbols-outlined { font-size: 18px; color: var(--primary-glow); opacity: 0.8; }

        /* MODAL FUTURISTIK */
        .modal-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(2, 6, 23, 0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            z-index: 1000; display: flex; justify-content: center; align-items: center; 
            padding: 30px; opacity: 0; pointer-events: none; transition: all 0.4s ease; 
        }
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        
        .modal-box { 
            background: rgba(15, 23, 42, 0.7); width: 100%; max-width: 1100px; border-radius: 24px; 
            border: 1px solid rgba(148, 163, 184, 0.1); overflow: hidden; display: flex; 
            box-shadow: 0 0 80px rgba(14, 165, 233, 0.15), inset 0 0 0 1px rgba(255, 255, 255, 0.05); 
            transform: scale(0.9); opacity: 0; transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1); 
            max-height: 85vh; position: relative; backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
        }
        .modal-overlay.active .modal-box { transform: scale(1); opacity: 1; }
        
        .modal-left { flex: 1.1; background: #020617; overflow-y: auto; display: flex; align-items: center; justify-content: center; border-right: 1px solid rgba(255,255,255,0.05); position: relative; }
        .modal-left::after { content:''; position: absolute; inset:0; background: linear-gradient(to bottom, transparent, rgba(2,6,23,0.5)); pointer-events: none; }
        .modal-poster { width: 100%; height: auto; max-height: 100%; object-fit: contain; display: block; }
        
        .modal-right { flex: 1; padding: 50px; overflow-y: auto; }
        .close-btn { 
            position: absolute; top: 20px; right: 20px; 
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); 
            width: 44px; height: 44px; border-radius: 12px; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; color: var(--text-muted); 
            transition: all 0.3s; z-index: 10; backdrop-filter: blur(10px); 
        }
        .close-btn:hover { background: rgba(239, 68, 68, 0.15); color: #f87171; border-color: #f87171; box-shadow: 0 0 15px rgba(239, 68, 68, 0.3); transform: rotate(90deg); }

        .modal-title { font-size: 2.2rem; margin: 0 0 10px 0; color: var(--text-light); line-height: 1.2; font-weight: 800; }
        .modal-organizer { font-size: 1.1rem; color: var(--primary-glow); margin-bottom: 40px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; display: flex; align-items: center; gap: 10px; }
        .modal-organizer::before { content:''; display: block; width: 30px; height: 2px; background: var(--accent-gradient); }
        
        .info-group { margin-bottom: 25px; background: rgba(255,255,255,0.03); padding: 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); transition: all 0.3s; }
        .info-group:hover { background: rgba(255,255,255,0.05); border-color: rgba(14, 165, 233, 0.2); }
        .info-label { font-weight: 700; display: block; margin-bottom: 8px; color: var(--primary-glow); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1.5px; }
        .info-value { color: var(--text-light); display: flex; align-items: center; gap: 12px; font-size: 1.05rem; font-weight: 500; }
        .info-value .material-symbols-outlined { color: var(--text-muted); opacity: 0.8; }

        .modal-links { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 40px; }
        .link-btn { 
            display: flex; align-items: center; justify-content: center; gap: 10px; padding: 14px; 
            border-radius: 14px; text-decoration: none; font-weight: 700; font-size: 0.9rem; 
            transition: all 0.3s; cursor: pointer; border: 1px solid transparent; font-family: inherit; 
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .btn-full { grid-column: 1 / -1; }
        .btn-primary { background: var(--accent-gradient); color: white; box-shadow: 0 4px 20px rgba(14, 165, 233, 0.3); border: none; }
        .btn-primary:hover { box-shadow: 0 0 30px rgba(14, 165, 233, 0.5); transform: translateY(-3px); }
        .btn-secondary { background: rgba(14, 165, 233, 0.1); color: var(--primary-glow); border-color: rgba(14, 165, 233, 0.3); }
        .btn-secondary:hover { background: rgba(14, 165, 233, 0.2); border-color: var(--primary-glow); box-shadow: 0 0 20px rgba(14, 165, 233, 0.2); }
        .btn-action { background: transparent; color: var(--text-muted); border-color: rgba(255,255,255,0.1); }
        .btn-action:hover { border-color: var(--text-light); color: var(--text-light); background: rgba(255,255,255,0.05); }

        #toast { 
            visibility: hidden; min-width: 280px; background: rgba(15, 23, 42, 0.9); 
            color: var(--primary-glow); text-align: center; border-radius: 50px; padding: 16px 24px; 
            position: fixed; z-index: 2000; left: 50%; bottom: 30px; font-weight: 600; 
            transform: translateX(-50%) translateY(20px); opacity: 0; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); border: 1px solid rgba(14, 165, 233, 0.3);
            backdrop-filter: blur(10px);
        }
        #toast.show { visibility: visible; opacity: 1; transform: translateX(-50%) translateY(0); bottom: 50px; }

        @media (max-width: 768px) {
            body { padding: 30px 15px; }
            h1 { font-size: 2.2rem; }
            .controls { flex-direction: column; gap: 15px; margin: 30px 0; }
            .modal-box { flex-direction: column; max-height: 92vh; }
            .modal-left { flex: none; height: 250px; border-right: none; border-bottom: 1px solid rgba(255,255,255,0.05); }
            .modal-right { flex: none; padding: 30px 25px; }
            .modal-title { font-size: 1.8rem; }
            .modal-links { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-section">
            <div class="logo-container">
                <img src="https://res.cloudinary.com/dg4jf2sag/image/upload/v1772438965/logo_iris_gftpz1.png" alt="IRIS Logo" class="brand-logo" onerror="this.style.display='none'">
                <h1>IRIS <span>Competition Center</span></h1>
            </div>
            <p class="subtitle">Platform informasi kompetisi terpadu.</p>
            
            <div class="controls">
                <div class="search-wrapper">
                    <span class="material-symbols-outlined search-icon">search</span>
                    <input type="text" id="search-input" class="search-box" placeholder="Cari event atau kompetisi...">
                </div>
                <select id="filter-penyelenggara" class="filter-box">
                    <option value="all">Semua Penyelenggara</option>
                </select>
            </div>

            <div class="tabs">
                <button id="tab-all" class="tab-btn active"><span class="material-symbols-outlined">grid_view</span> Semua Lomba</button>
                <button id="tab-saved" class="tab-btn"><span class="material-symbols-rounded">star</span> Tersimpan</button>
            </div>
        </div>
        
        <div id="lomba-container">
            <p style="text-align: center;grid-column: 1/-1;color:var(--text-muted);font-weight:500;letter-spacing:1px;">SEDANG MEMUAT SISTEM...</p>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-box">
            <button class="close-btn" onclick="tutupModal()"><span class="material-symbols-outlined">close</span></button>
            <div class="modal-left">
                <img src="" alt="Poster" class="modal-poster" id="modalPoster" onerror="this.style.display='none'">
            </div>
            <div class="modal-right">
                <h2 class="modal-title" id="modalTitle">Judul Lomba</h2>
                <div class="modal-organizer" id="modalOrganizer">Penyelenggara</div>
                
                <div class="info-group">
                    <span class="info-label">Deadline Pendaftaran</span>
                    <div class="info-value" id="modalDeadline"><span class="material-symbols-outlined">calendar_month</span> -</div>
                </div>
                <div class="info-group">
                    <span class="info-label">Tanggal Penyisihan</span>
                    <div class="info-value" id="modalPenyisihan"><span class="material-symbols-outlined">swords</span> -</div>
                </div>

                <div class="modal-links" id="modalLinks"></div>
            </div>
        </div>
    </div>

    <div id="toast">Tautan berhasil disalin!</div>

    <script src="script.js"></script>
</body>

</html>
